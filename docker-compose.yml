version: '3.8'

services:
  # PostgreSQL (for auth-svc) - not exposed externally
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "-c shared_buffers=256MB"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./microservices/auth-svc/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Auth Service (PostgreSQL) - not exposed externally, accessed via Nginx
  auth-svc:
    build:
      context: .
      dockerfile: Dockerfile
      target: auth-svc
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/auth_svc
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend-network

  # Frontend
  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost
    depends_on:
      - nginx
    networks:
      - frontend-network

  # Nginx Gateway (between frontend and backend)
  nginx:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - auth-svc
    networks:
      - frontend-network
      - backend-network

networks:
  frontend-network:
    driver: bridge
  backend-network:
    driver: bridge

volumes:
  postgres_data:
