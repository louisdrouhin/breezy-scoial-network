name: breezy

services:
  # ============================================================
  # AUTH SERVICE STACK
  # ============================================================
  auth-postgres:
    image: postgres:16-alpine
    container_name: auth-postgres-prod
    environment:
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
      POSTGRES_DB: auth_svc
    env_file:
      - .env.prod
    volumes:
      - auth-svc-db:/var/lib/postgresql/data
    networks:
      - backend
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-svc:
    build:
      context: .
      dockerfile: Dockerfile
      target: auth-svc
    container_name: auth-svc-prod
    environment:
      DATABASE_URL: postgresql://${AUTH_DB_USER}:${AUTH_DB_PASSWORD}@auth-postgres:5432/auth_svc?schema=public
      PORT: 3001
    env_file:
      - .env.prod
    depends_on:
      auth-postgres:
        condition: service_healthy
    networks:
      - backend
    restart: always

  # ============================================================
  # USER SERVICE STACK
  # ============================================================
  user-postgres:
    image: postgres:16-alpine
    container_name: user-postgres-prod
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: user_svc
    volumes:
      - user-svc-db:/var/lib/postgresql/data
    networks:
      - backend
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-svc:
    build:
      context: .
      dockerfile: microservices/user-svc/Dockerfile
    container_name: user-svc-prod
    environment:
      DATABASE_URL: postgresql://postgres:postgres@user-postgres:5432/user_svc?schema=public
      PORT: 3002
    depends_on:
      user-postgres:
        condition: service_healthy
    networks:
      - backend
    restart: always

  # ============================================================
  # POST SERVICE STACK
  # ============================================================
  post-mongo:
    image: mongo:7
    container_name: post-mongo-prod
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: post_svc
    volumes:
      - post-svc-db:/data/db
    networks:
      - backend
    restart: always
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    env_file:
      - .env.prod

  post-svc:
    build:
      context: .
      dockerfile: Dockerfile
      target: post-svc
    container_name: post-svc-prod
    environment:
      MONGODB_URI: mongodb://admin:password@post-mongo:27017/post_svc?authSource=admin
      PORT: 3003
    env_file:
      - .env.prod
    depends_on:
      post-mongo:
        condition: service_healthy
    networks:
      - backend
    restart: always

  # ============================================================
  # NOTIFICATION SERVICE STACK
  # ============================================================
  notif-mongo:
    image: mongo:7
    container_name: notif-mongo-prod
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: notif_svc
    volumes:
      - notif-svc-db:/data/db
    networks:
      - backend
    restart: always
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    env_file:
      - .env.prod

  notif-svc:
    build:
      context: .
      dockerfile: Dockerfile
      target: notif-svc
    container_name: notif-svc-prod
    environment:
      MONGODB_URI: mongodb://admin:password@notif-mongo:27017/notif_svc?authSource=admin
      PORT: 3004
    env_file:
      - .env.prod
    depends_on:
      notif-mongo:
        condition: service_healthy
    networks:
      - backend
    restart: always

  # ============================================================
  # FEED SERVICE (no DB)
  # ============================================================
  feed-svc:
    build:
      context: .
      dockerfile: Dockerfile
      target: feed-svc
    container_name: feed-svc-prod
    environment:
      PORT: 3005
    networks:
      - backend
    restart: always

  # ============================================================
  # FRONTEND
  # ============================================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    container_name: frontend-prod
    environment:
      NEXT_PUBLIC_API_URL: https://api.example.com
    networks:
      - backend
    restart: always

  # ============================================================
  # NGINX GATEWAY
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: nginx-prod
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - backend
      - frontend
    restart: always

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge

volumes:
  auth-svc-db:
  user-svc-db:
  post-svc-db:
  notif-svc-db:
