user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;

  # ============================================================
  # DNS RESOLVER (résolution dynamique des noms de services)
  # ============================================================
  # 127.0.0.11 = DNS embarqué de Docker. Résolution AU MOMENT DE LA REQUÊTE
  # (et non au démarrage) : Nginx démarre même si un backend est down, renvoie
  # un 502 le temps qu'il monte, puis se rétablit seul. Évite aussi le crash
  # "host not found in upstream" et le 502 après recreate (IP périmée).
  # Indispensable : la résolution dynamique ne s'active que si le proxy_pass
  # contient une variable — d'où les `set $upstream_* ...` dans chaque location.
  resolver 127.0.0.11 valid=10s ipv6=off;
  resolver_timeout 5s;

  # ============================================================
  # WEBSOCKET UPGRADE (Next.js HMR in dev, and any WS endpoint)
  # ============================================================
  # When the request carries an Upgrade header, Connection must be "upgrade";
  # otherwise it should be "close" so normal HTTP keep-alive still works.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # ============================================================
  # CORS CONFIGURATION
  # ============================================================
  map $http_origin $cors_origin {
    default "";
    "~^https?://localhost(:\d+)?$" $http_origin;
    "~^https?://127\.0\.0\.1(:\d+)?$" $http_origin;
    "~^https?://192\.168\.\d+\.\d+(:\d+)?$" $http_origin;
    "~^https?://172\.\d+\.\d+\.\d+(:\d+)?$" $http_origin;
    "~^https?://10\.\d+\.\d+\.\d+(:\d+)?$" $http_origin;
  }

  # ============================================================
  # MAIN SERVER
  # ============================================================
  server {
    listen 80;
    server_name _;
    client_max_body_size 10M;

    # ========== STATIC FILES (avatars, banners) ==========
    location /uploads/ {
      alias /uploads/;
      expires 30d;
      add_header Cache-Control "public, immutable";
    }

    # ========== FRONTEND (root) — no auth required ==========
    location / {
      set $upstream_frontend http://frontend:3000;
      proxy_pass $upstream_frontend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ========== AUTH SERVICE — public endpoints (no auth_request) ==========
    location ~ ^/api/auth/(register|login|refresh|logout|validate-cookie|health|me)$ {
      if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        return 204;
      }
      add_header 'Access-Control-Allow-Origin' $cors_origin always;
      add_header 'Access-Control-Allow-Credentials' 'true' always;
      set $upstream_auth http://auth-svc:3001;
      proxy_pass $upstream_auth/api/auth/$1$is_args$args;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ========== AUTH VALIDATE — internal endpoint (used by auth_request) ==========
    location = /_auth_validate {
      internal;
      set $upstream_auth http://auth-svc:3001;
      proxy_pass $upstream_auth/api/auth/validate-cookie;
      proxy_pass_request_body off;
      proxy_set_header Content-Length "";
      proxy_set_header X-Original-URI $request_uri;
    }

    # ========== PROTECTED API ROUTES (require valid JWT) ==========

    # USER SERVICE
    location ~ ^/api/users/(.*)$ {
      auth_request /_auth_validate;
      auth_request_set $x_user_username $upstream_http_x_user_username;
      auth_request_set $x_user_role $upstream_http_x_user_role;

      if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        return 204;
      }
      add_header 'Access-Control-Allow-Origin' $cors_origin always;
      add_header 'Access-Control-Allow-Credentials' 'true' always;
      set $upstream_user http://user-svc:3002;
      proxy_pass $upstream_user/api/users/$1$is_args$args;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-User-Username $x_user_username;
      proxy_set_header X-User-Role $x_user_role;
    }

    # POST SERVICE — matches /api/posts (collection) and /api/posts/... (items)
    location ~ ^/api/posts(/.*)?$ {
      auth_request /_auth_validate;
      auth_request_set $x_user_username $upstream_http_x_user_username;
      auth_request_set $x_user_role $upstream_http_x_user_role;

      if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        return 204;
      }
      add_header 'Access-Control-Allow-Origin' $cors_origin always;
      add_header 'Access-Control-Allow-Credentials' 'true' always;
      set $upstream_post http://post-svc:3003;
      proxy_pass $upstream_post/api/posts$1$is_args$args;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-User-Username $x_user_username;
      proxy_set_header X-User-Role $x_user_role;
    }

    # NOTIFICATION SERVICE
    location ~ ^/api/notifs/(.*)$ {
      auth_request /_auth_validate;
      auth_request_set $x_user_username $upstream_http_x_user_username;
      auth_request_set $x_user_role $upstream_http_x_user_role;

      if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        return 204;
      }
      add_header 'Access-Control-Allow-Origin' $cors_origin always;
      add_header 'Access-Control-Allow-Credentials' 'true' always;
      set $upstream_notif http://notif-svc:3004;
      proxy_pass $upstream_notif/api/notifs/$1$is_args$args;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-User-Username $x_user_username;
      proxy_set_header X-User-Role $x_user_role;
    }

    location = /api/notifs {
      auth_request /_auth_validate;
      auth_request_set $x_user_username $upstream_http_x_user_username;
      auth_request_set $x_user_role $upstream_http_x_user_role;

      if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        return 204;
      }
      add_header 'Access-Control-Allow-Origin' $cors_origin always;
      add_header 'Access-Control-Allow-Credentials' 'true' always;
      set $upstream_notif http://notif-svc:3004;
      proxy_pass $upstream_notif/api/notifs;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-User-Username $x_user_username;
      proxy_set_header X-User-Role $x_user_role;
    }

    # FEED SERVICE
    location ~ ^/api/feed/(.*)$ {
      auth_request /_auth_validate;
      auth_request_set $x_user_username $upstream_http_x_user_username;
      auth_request_set $x_user_role $upstream_http_x_user_role;

      if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        return 204;
      }
      add_header 'Access-Control-Allow-Origin' $cors_origin always;
      add_header 'Access-Control-Allow-Credentials' 'true' always;
      set $upstream_feed http://feed-svc:3005;
      proxy_pass $upstream_feed/api/feed/$1$is_args$args;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-User-Username $x_user_username;
      proxy_set_header X-User-Role $x_user_role;
    }

    location = /api/feed {
      auth_request /_auth_validate;
      auth_request_set $x_user_username $upstream_http_x_user_username;
      auth_request_set $x_user_role $upstream_http_x_user_role;

      if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        return 204;
      }
      add_header 'Access-Control-Allow-Origin' $cors_origin always;
      add_header 'Access-Control-Allow-Credentials' 'true' always;
      set $upstream_feed http://feed-svc:3005;
      proxy_pass $upstream_feed/api/feed;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-User-Username $x_user_username;
      proxy_set_header X-User-Role $x_user_role;
    }

    # ========== CATCH-ALL API (404) ==========
    location ~ ^/api/(.*)$ {
      add_header 'Access-Control-Allow-Origin' $cors_origin always;
      return 404;
    }
  }
}
