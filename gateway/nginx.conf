user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;

  upstream auth_svc {
    server auth-svc:3001;
  }

  upstream user_svc {
    server user-svc:3002;
  }

  upstream post_svc {
    server post-svc:3003;
  }

  upstream notif_svc {
    server notif-svc:3004;
  }

  upstream feed_svc {
    server feed-svc:3005;
  }

  upstream frontend {
    server frontend:3000;
  }

  server {
    listen 80;
    server_name localhost;
    client_max_body_size 10M;

    # Public routes (no auth required)
    location /api/auth/register {
      proxy_pass http://auth_svc;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/auth/login {
      proxy_pass http://auth_svc;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/auth/validate {
      proxy_pass http://auth_svc;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Auth request subroutine for protected routes
    location = /auth_check {
      internal;
      proxy_pass http://auth_svc/api/auth/validate;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Authorization $http_authorization;
      proxy_pass_request_body off;
      proxy_set_header Content-Length "";
    }

    # Protected API routes
    location /api/users {
      auth_request /auth_check;
      auth_request_set $user_id $upstream_http_x_user_id;

      proxy_pass http://user_svc;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-User-Id $user_id;
    }

    location /api/posts {
      auth_request /auth_check;
      auth_request_set $user_id $upstream_http_x_user_id;

      proxy_pass http://post_svc;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-User-Id $user_id;
    }

    location /api/notifications {
      auth_request /auth_check;
      auth_request_set $user_id $upstream_http_x_user_id;

      proxy_pass http://notif_svc;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-User-Id $user_id;
    }

    location /api/feed {
      auth_request /auth_check;
      auth_request_set $user_id $upstream_http_x_user_id;

      proxy_pass http://feed_svc;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-User-Id $user_id;
    }

    # Frontend - all other routes
    location / {
      proxy_pass http://frontend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
