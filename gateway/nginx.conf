user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;

  # ============================================================
  # BACKEND SERVICES
  # ============================================================
  upstream auth_svc {
    server auth-svc:3001;
  }

  upstream user_svc {
    server user-svc:3002;
  }

  upstream post_svc {
    server post-svc:3003;
  }

  upstream notif_svc {
    server notif-svc:3004;
  }

  upstream feed_svc {
    server feed-svc:3005;
  }

  upstream frontend {
    server frontend:3000;
  }

  # ============================================================
  # CORS CONFIGURATION
  # ============================================================
  map $http_origin $cors_origin {
    default "";
    "~^https?://localhost(:\d+)?$" $http_origin;
    "~^https?://127\.0\.0\.1(:\d+)?$" $http_origin;
    "~^https?://192\.168\.\d+\.\d+(:\d+)?$" $http_origin;
    "~^https?://172\.\d+\.\d+\.\d+(:\d+)?$" $http_origin;
    "~^https?://10\.\d+\.\d+\.\d+(:\d+)?$" $http_origin;
  }

  # ============================================================
  # MAIN SERVER
  # ============================================================
  server {
    listen 80;
    server_name _;
    client_max_body_size 10M;

    # ========== STATIC FILES (avatars, banners) ==========
    location /uploads/ {
      alias /uploads/;
      expires 30d;
      add_header Cache-Control "public, immutable";
    }

    # ========== FRONTEND (root) — no auth required ==========
    location / {
      proxy_pass http://frontend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ========== AUTH SERVICE — public endpoints (no auth_request) ==========
    location ~ ^/api/auth/(register|login|refresh|logout|validate-cookie|health)$ {
      if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        return 204;
      }
      add_header 'Access-Control-Allow-Origin' $cors_origin always;
      add_header 'Access-Control-Allow-Credentials' 'true' always;
      proxy_pass http://auth_svc/api/auth/$1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ========== AUTH VALIDATE — internal endpoint (used by auth_request) ==========
    location = /_auth_validate {
      internal;
      proxy_pass http://auth_svc/api/auth/validate-cookie;
      proxy_pass_request_body off;
      proxy_set_header Content-Length "";
      proxy_set_header X-Original-URI $request_uri;
    }

    # ========== PROTECTED API ROUTES (require valid JWT) ==========

    # USER SERVICE
    location ~ ^/api/users/(.*)$ {
      auth_request /_auth_validate;
      auth_request_set $x_user_username $upstream_http_x_user_username;
      auth_request_set $x_user_role $upstream_http_x_user_role;

      if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        return 204;
      }
      auth_request /_auth_validate;
      auth_request_set $x_user_username $upstream_http_x_user_username;
      auth_request_set $x_user_role $upstream_http_x_user_role;

      add_header 'Access-Control-Allow-Origin' $cors_origin always;
      add_header 'Access-Control-Allow-Credentials' 'true' always;
      proxy_pass http://user_svc/api/users/$1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-User-Username $x_user_username;
      proxy_set_header X-User-Role $x_user_role;
    }

    # POST SERVICE
    location ~ ^/api/posts/(.*)$ {
      auth_request /_auth_validate;
      auth_request_set $x_user_username $upstream_http_x_user_username;
      auth_request_set $x_user_role $upstream_http_x_user_role;

      if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        return 204;
      }
      auth_request /_auth_validate;
      auth_request_set $x_user_username $upstream_http_x_user_username;
      auth_request_set $x_user_role $upstream_http_x_user_role;

      add_header 'Access-Control-Allow-Origin' $cors_origin always;
      add_header 'Access-Control-Allow-Credentials' 'true' always;
      proxy_pass http://post_svc/api/posts/$1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-User-Username $x_user_username;
      proxy_set_header X-User-Role $x_user_role;
    }

    # NOTIFICATION SERVICE
    location ~ ^/api/notifs/(.*)$ {
      auth_request /_auth_validate;
      auth_request_set $x_user_username $upstream_http_x_user_username;
      auth_request_set $x_user_role $upstream_http_x_user_role;

      if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        return 204;
      }
      auth_request /_auth_validate;
      auth_request_set $x_user_username $upstream_http_x_user_username;
      auth_request_set $x_user_role $upstream_http_x_user_role;

      add_header 'Access-Control-Allow-Origin' $cors_origin always;
      add_header 'Access-Control-Allow-Credentials' 'true' always;
      proxy_pass http://notif_svc/api/notifs/$1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-User-Username $x_user_username;
      proxy_set_header X-User-Role $x_user_role;
    }

    location = /api/notifs {
      auth_request /_auth_validate;
      auth_request_set $x_user_username $upstream_http_x_user_username;
      auth_request_set $x_user_role $upstream_http_x_user_role;

      if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        return 204;
      }
      auth_request /_auth_validate;
      auth_request_set $x_user_username $upstream_http_x_user_username;
      auth_request_set $x_user_role $upstream_http_x_user_role;

      add_header 'Access-Control-Allow-Origin' $cors_origin always;
      add_header 'Access-Control-Allow-Credentials' 'true' always;
      proxy_pass http://notif_svc/api/notifs;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-User-Username $x_user_username;
      proxy_set_header X-User-Role $x_user_role;
    }

    # FEED SERVICE
    location ~ ^/api/feed/(.*)$ {
      auth_request /_auth_validate;
      auth_request_set $x_user_username $upstream_http_x_user_username;
      auth_request_set $x_user_role $upstream_http_x_user_role;

      if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        return 204;
      }
      add_header 'Access-Control-Allow-Origin' $cors_origin always;
      add_header 'Access-Control-Allow-Credentials' 'true' always;
      proxy_pass http://feed_svc/api/feed/$1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-User-Username $x_user_username;
      proxy_set_header X-User-Role $x_user_role;
    }

    location = /api/feed {
      auth_request /_auth_validate;
      auth_request_set $x_user_username $upstream_http_x_user_username;
      auth_request_set $x_user_role $upstream_http_x_user_role;

      if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        return 204;
      }
      add_header 'Access-Control-Allow-Origin' $cors_origin always;
      add_header 'Access-Control-Allow-Credentials' 'true' always;
      proxy_pass http://feed_svc/api/feed;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-User-Username $x_user_username;
      proxy_set_header X-User-Role $x_user_role;
    }

    # ========== CATCH-ALL API (404) ==========
    location ~ ^/api/(.*)$ {
      add_header 'Access-Control-Allow-Origin' $cors_origin always;
      return 404;
    }
  }
}
